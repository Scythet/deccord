name: Build Flet Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Install Flutter 3.44.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet[all]==0.86.0"

      - name: Verify Flutter
        run: |
          flutter --version
          flutter doctor

      - name: Build APK
        run: |
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AntiChatControl-APK
          path: build/apk/*.apk
