name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flet
      run: |
        python -m pip install --upgrade pip
        pip install flet[cli]

    - name: Build APK
      run: |
        # Forzamos la instalación de Flutter de forma no interactiva
        flet build apk --flutter-sdk-path /home/runner/flutter
      env:
        # Estas variables evitan que Flet haga preguntas
        FLET_FORCE_FLUTTER_SDK_INSTALL: "true"
        FLUTTER_ROOT: "/home/runner/flutter"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AntiChatControl-APK
        path: build/apk/*.apk
