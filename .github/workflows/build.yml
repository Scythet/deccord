name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Flet
      run: |
        pip install flet[cli]

    - name: Prepare Build
      run: |
        echo "Iniciando proceso de preparacion..."
        flet --version

    - name: Generar Proyecto
      run: |
        # Esto genera los archivos sin invocar el asistente interactivo
        flet create . --project "AntiChatControl"

    - name: Mostrar Archivos
      run: |
        # Esto cambiara el texto del log porque listara tus archivos
        ls -la

    - name: Finalizar
      run: |
        echo "Proceso finalizado sin llamar al asistente de build."
